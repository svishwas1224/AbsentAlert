<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeaveFlow — Login</title>
  <link rel="stylesheet" href="frontend/assets/styles/main.css"/>
  <link rel="stylesheet" href="frontend/assets/styles/components.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
    .login-wrap{width:100%;max-width:440px;position:relative;z-index:1;animation:fadeUp .65s cubic-bezier(.16,1,.3,1) both;}
    .login-brand{text-align:center;margin-bottom:2rem;}
    .login-logo{width:64px;height:64px;background:linear-gradient(135deg,rgba(45,212,191,.15),rgba(45,212,191,.05));border:1px solid rgba(45,212,191,.3);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;box-shadow:0 0 40px rgba(45,212,191,.12);}
    .login-brand h1{font-family:'Sora',sans-serif;font-size:2.1rem;color:var(--text-1);letter-spacing:-.5px;}
    .login-brand h1 span{color:var(--teal);}
    .login-brand p{color:var(--text-3);font-size:.875rem;margin-top:.35rem;}
    .login-card{background:rgba(15,30,53,.9);border:1px solid var(--border);border-radius:24px;padding:2rem;backdrop-filter:blur(24px);box-shadow:0 24px 64px rgba(0,0,0,.5);}
    .role-tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:14px;padding:4px;margin-bottom:1.75rem;}
    .role-tab{flex:1;padding:.55rem;border:1px solid transparent;background:transparent;color:var(--text-3);font-family:'Inter',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;border-radius:11px;transition:all var(--transition);}
    .role-tab.active{background:var(--teal-dim);color:var(--teal);border-color:rgba(45,212,191,.25);}
    .login-error{display:none;color:var(--rejected);font-size:.82rem;margin-top:.75rem;padding:.6rem .875rem;background:var(--rejected-bg);border:1px solid rgba(248,113,113,.25);border-radius:10px;text-align:center;}
    .btn-login{width:100%;padding:.875rem;background:linear-gradient(135deg,var(--teal),#14b8a6);color:#042f2e;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:all .2s;letter-spacing:.3px;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(45,212,191,.3);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .demo-box{margin-top:1.25rem;padding:.875rem 1rem;background:rgba(45,212,191,.04);border:1px solid rgba(45,212,191,.1);border-radius:12px;font-size:.8rem;color:var(--text-3);line-height:1.9;}
    .demo-box strong{color:var(--teal);}
    .demo-chip{display:inline-block;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.2);border-radius:6px;padding:1px 8px;font-family:monospace;font-size:.78rem;color:var(--teal);cursor:pointer;transition:background .15s;}
    .demo-chip:hover{background:rgba(45,212,191,.2);}
    .feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1.25rem;}
    .feat-chip{display:flex;align-items:center;gap:7px;padding:.5rem .75rem;background:rgba(45,212,191,.03);border:1px solid rgba(45,212,191,.07);border-radius:10px;font-size:.75rem;color:var(--text-3);}
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-logo">📋</div>
    <h1>Leave<span>Flow</span></h1>
    <p>Automated Leave Intimation System for Colleges</p>
  </div>

  <div class="login-card">
    <div class="role-tabs">
      <button class="role-tab active" id="tab-student" onclick="setRole('student')">🎓 Student</button>
      <button class="role-tab" id="tab-faculty" onclick="setRole('faculty')">👨‍🏫 Faculty</button>
    </div>

    <div class="form-group">
      <label class="form-label">Email / Roll Number</label>
      <div class="input-group">
        <span class="input-icon">✉️</span>
        <input type="text" class="form-control" id="login-email" placeholder="student@demo.com" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" class="form-control" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <div class="login-error" id="login-error"></div>

    <button class="btn-login" id="login-btn" onclick="login()">Sign In &nbsp;→</button>

    <div class="divider"><span>Quick Demo Access</span></div>

    <div class="demo-box">
      <strong>Student:</strong> <span class="demo-chip" onclick="fillDemo('student')">student@demo.com</span> / <span class="demo-chip" onclick="fillDemo('student')">1234</span><br>
      <strong>Faculty:</strong> <span class="demo-chip" onclick="fillDemo('faculty')">faculty@demo.com</span> / <span class="demo-chip" onclick="fillDemo('faculty')">1234</span>
    </div>

    <div class="feat-grid">
      <div class="feat-chip">✍️ Easy Applications</div>
      <div class="feat-chip">🔔 Auto Notifications</div>
      <div class="feat-chip">📊 Digital Records</div>
      <div class="feat-chip">✅ Quick Approvals</div>
    </div>
  </div>
</div>

<script src="frontend/assets/scripts/storage.js"></script>
<script>
let currentRole = 'student';

function setRole(role) {
  currentRole = role;
  document.getElementById('tab-student').classList.toggle('active', role === 'student');
  document.getElementById('tab-faculty').classList.toggle('active', role === 'faculty');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-email').placeholder = role === 'student' ? 'student@demo.com' : 'faculty@demo.com';
}

function fillDemo(role) {
  setRole(role);
  document.getElementById('login-email').value = role === 'student' ? 'student@demo.com' : 'faculty@demo.com';
  document.getElementById('login-pass').value = '1234';
}

function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');

  if (!email || !pass) {
    err.textContent = '⚠ Please enter your credentials.';
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3500);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  setTimeout(() => {
    if (currentRole === 'student' && email === 'student@demo.com' && pass === '1234') {
      Storage.setUser({role:'student', name:'Arjun Sharma', id:'CS2021045', dept:'Computer Science', year:'3rd Year', faculty:'Dr. Priya Nair'});
      window.location.href = 'frontend/pages/student-dashboard.html';
    } else if (currentRole === 'faculty' && email === 'faculty@demo.com' && pass === '1234') {
      Storage.setUser({role:'faculty', name:'Dr. Priya Nair', id:'FAC2015', dept:'Computer Science', designation:'Associate Professor'});
      window.location.href = 'frontend/pages/faculty-dashboard.html';
    } else {
      btn.disabled = false;
      btn.innerHTML = 'Sign In &nbsp;→';
      err.textContent = '⚠ Invalid credentials. Use the demo accounts below.';
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 4000);
    }
  }, 650);
}

document.addEventListener('DOMContentLoaded', () => {
  Storage.seed();
  document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
});
</script>
</body>
</html>
